aid: vodafone
name: Vodafone
description: >-
  Vodafone Group plc is a UK-headquartered (Newbury, England) multinational
  telecommunications company and one of the world's largest mobile and fixed
  network operators, with operations in 15 country markets and partner-market
  agreements covering 40+ additional countries across Europe and Africa. The
  group serves 279 million mobile customers, 5 million business customers, and
  manages 215+ million IoT connections through its Vodafone IoT platform. Beyond
  mobile and broadband connectivity, Vodafone operates one of the largest
  IoT/M2M businesses in the industry, invests in 70+ subsea cables, and runs
  financial services like M-PESA (Africa) and Vodapay. Through Vodafone Business
  it sells connectivity, cloud, security, and managed-mobility services to
  enterprises, and through the GSMA Open Gateway and CAMARA initiative it
  exposes a growing portfolio of standardised network APIs (Number Verify,
  SIM Swap, Quality on Demand, Device Location, Match, MVNO Discovery, and
  more) via the Vodafone Developer Marketplace (developer.vodafone.com), which
  publishes 27+ commercial and CAMARA APIs across Identity, Mobile, Analytics,
  Boost/QoS, and Partner categories. The Marketplace exposes sandbox and live
  endpoints under api-sandbox.vf-dmp.engineering.vodafone.com and
  api.vf-dmp.engineering.vodafone.com, with OAuth2 (Consumer Key / Consumer
  Secret) authentication and Postman collections for every product. Vodafone is
  a premier member of the CAMARA alliance hosted at the Linux Foundation, a
  founding participant in the GSMA Open Gateway, and one of the principal
  telco operators driving network-as-an-API adoption globally.
