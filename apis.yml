        url: https://developer.vodafone.com/api-catalogue/qos-profiles/overview
      - type: Specification
        url: https://github.com/camaraproject/QualityOnDemand
    description: >-
      Lists the QoS profiles a developer may request via Quality on Demand,
      including profile identifiers, throughput class, and latency targets.
  - aid: vodafone:qos-provisioning
    name: QoS Provisioning
    tags:
      - Boost
      - Quality of Service
      - QoS
      - Open Gateway
    humanURL: https://developer.vodafone.com/api-catalogue/qos-provisioning/overview
    properties:
      - type: Documentation
        url: https://developer.vodafone.com/api-catalogue/qos-provisioning/overview
    description: >-
      Longer-lived QoS provisioning for enterprise customers who want a
      persistent QoS profile applied to a set of subscriptions. Available in
      DE and UK.
  - aid: vodafone:active-subscriber
    name: Active Subscriber
    tags:
      - Identity
      - Subscriber
      - Verification
    humanURL: https://developer.vodafone.com/api-catalogue/active-subscriber/overview
    properties:
      - type: Documentation
        url: https://developer.vodafone.com/api-catalogue/active-subscriber/overview
    description: >-
      Confirms whether an MSISDN is currently an active Vodafone subscriber.
      Available in UK.
  - aid: vodafone:age-verify
    name: Age Verify
    tags:
      - Identity
      - Age Verification
      - Compliance
    humanURL: https://developer.vodafone.com/api-catalogue/age-verify/overview
    properties:
      - type: Documentation
        url: https://developer.vodafone.com/api-catalogue/age-verify/overview
    description: >-
      Network-based age-assurance lookup that returns whether the subscriber
      behind a given MSISDN is above a configured age threshold, without
      revealing the underlying date of birth.
  - aid: vodafone:call-divert
    name: Call Divert
    tags:
      - Identity
      - Call Divert
      - Fraud Prevention
    humanURL: https://developer.vodafone.com/api-catalogue/call-divert/overview
    properties:
      - type: Documentation
        url: https://developer.vodafone.com/api-catalogue/call-divert/overview
    description: >-
      Indicates whether call forwarding is currently active on the target
      number — a useful signal for fraud-detection flows where divert-to-
      attacker is a common attack vector.
  - aid: vodafone:home-network-check
    name: Home Network Check
    tags:
      - Identity
      - Roaming
      - Network
    humanURL: https://developer.vodafone.com/api-catalogue/home-network-check/overview
    properties:
      - type: Documentation
        url: https://developer.vodafone.com/api-catalogue/home-network-check/overview
    description: >-
      Returns whether a subscriber is currently on their home network or
      roaming — useful for fraud-scoring and conditional flows that adjust
      behaviour based on roaming status.
  - aid: vodafone:mvno-discovery
    name: MVNO Discovery
