apis:
  - aid: vodafone:number-verification-camara
    name: Number Verification 2.0 (CAMARA)
    tags:
      - Identity
      - Number Verification
      - CAMARA
      - Open Gateway
      - Authentication
    humanURL: https://developer.vodafone.com/api-catalogue/number-verification-camara-2/overview
    properties:
      - type: Documentation
        url: https://developer.vodafone.com/api-catalogue/number-verification-camara-2/overview
      - type: SignUp
        url: https://developer.vodafone.com/signup
      - type: Sandbox
        url: https://api-sandbox.vf-dmp.engineering.vodafone.com
      - type: Specification
        url: https://github.com/camaraproject/NumberVerification
    description: >-
      Frictionless mobile-number verification that confirms ownership of the
      MSISDN currently in use on the device, using the operator network rather
      than SMS one-time-passcodes. Implements the CAMARA Number Verification
      2.0 API and is available in DE, NL, and UK.
  - aid: vodafone:number-verification-1-camara
    name: Number Verification 1.0 (CAMARA)
    tags:
      - Identity
      - Number Verification
      - CAMARA
      - Open Gateway
    humanURL: https://developer.vodafone.com/api-catalogue/number-verification-camara/overview
    properties:
      - type: Documentation
        url: https://developer.vodafone.com/api-catalogue/number-verification-camara/overview
      - type: Specification
        url: https://github.com/camaraproject/NumberVerification
    description: >-
      Earlier CAMARA Number Verification implementation, still maintained for
      backwards compatibility with integrations built before the 2.0 release.
  - aid: vodafone:sim-swap-camara
    name: SIM Swap (CAMARA)
    tags:
      - Identity
      - SIM Swap
      - Fraud Prevention
      - CAMARA
      - Open Gateway
    humanURL: https://developer.vodafone.com/api-catalogue/sim-swap-camara
    properties:
      - type: Documentation
        url: https://developer.vodafone.com/api-catalogue/sim-swap-camara
      - type: Specification
        url: https://github.com/camaraproject/SimSwap
      - type: Sandbox
        url: https://api-sandbox.vf-dmp.engineering.vodafone.com
    description: >-
      CAMARA SIM Swap API that returns the timestamp of the most recent SIM
      change for a given MSISDN (latestSimChange), used by banks and fintech
      apps to detect SIM-swap fraud before approving high-risk operations.
  - aid: vodafone:match-camara
    name: Match (CAMARA)
    tags:
      - Identity
      - KYC
      - Match
      - CAMARA
      - Open Gateway
    humanURL: https://developer.vodafone.com/api-catalogue/match-camara/overview
    properties:
      - type: Documentation
        url: https://developer.vodafone.com/api-catalogue/match-camara/overview
      - type: Specification
        url: https://github.com/camaraproject/KnowYourCustomer
    description: >-
      CAMARA-aligned identity-match API that compares user-supplied attributes
      (name, address, date of birth) against operator-held subscriber records
      and returns match/no-match indicators for KYC and onboarding flows.
  - aid: vodafone:number-recycling-camara
    name: Number Recycling (CAMARA)
    tags:
      - Identity
      - Number Recycling
      - CAMARA
      - Open Gateway
    humanURL: https://developer.vodafone.com/api-catalogue/number-recycling-camara/overview
    properties:
      - type: Documentation
        url: https://developer.vodafone.com/api-catalogue/number-recycling-camara/overview
      - type: Specification
        url: https://github.com/camaraproject/NumberRecycling
    description: >-
      Tells callers whether a mobile number has been recycled (re-assigned to
      a new subscriber) since a given date, so that downstream systems can
      revoke stale account bindings before sending sensitive notifications.
  - aid: vodafone:quality-on-demand
    name: Quality on Demand
    tags:
      - Boost
      - Quality of Service
      - QoS
      - 5G
      - CAMARA
      - Open Gateway
    humanURL: https://developer.vodafone.com/api-catalogue/quality-on-demand/overview
    properties:
      - type: Documentation
        url: https://developer.vodafone.com/api-catalogue/quality-on-demand/overview
      - type: Specification
        url: https://github.com/camaraproject/QualityOnDemand
    description: >-
      CAMARA Quality on Demand API for requesting a temporary QoS uplift on a
      specific UE session — used for cloud gaming, live broadcast contribution,
      drone control, and other latency- or throughput-sensitive workloads.
  - aid: vodafone:qos-profiles
    name: Quality of Service Profiles
    tags:
      - Boost
      - Quality of Service
      - QoS
      - CAMARA
      - Open Gateway
    humanURL: https://developer.vodafone.com/api-catalogue/qos-profiles/overview
    properties:
